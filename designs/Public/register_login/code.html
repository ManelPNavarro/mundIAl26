<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#4f3100",
              "on-tertiary-container": "#424a54",
              "on-primary-fixed-variant": "#005225",
              "secondary-fixed": "#ffddb4",
              "primary-container": "#00d46a",
              "primary": "#42f183",
              "outline-variant": "#3c4a3d",
              "surface-bright": "#3a3939",
              "on-surface-variant": "#bbcbb9",
              "background": "#131313",
              "on-background": "#e5e2e1",
              "surface-variant": "#353534",
              "inverse-on-surface": "#313030",
              "surface-container-high": "#2a2a2a",
              "primary-fixed-dim": "#2ce377",
              "inverse-primary": "#006d33",
              "tertiary-container": "#b2b9c5",
              "surface-tint": "#2ce377",
              "surface-container-lowest": "#0e0e0e",
              "secondary": "#ffb955",
              "surface": "#131313",
              "on-primary-fixed": "#00210b",
              "primary-fixed": "#63ff94",
              "tertiary-fixed-dim": "#c0c7d3",
              "tertiary-fixed": "#dce3f0",
              "on-secondary": "#452b00",
              "surface-dim": "#131313",
              "on-tertiary": "#2a313b",
              "surface-container": "#201f1f",
              "secondary-fixed-dim": "#ffb955",
              "on-error": "#690005",
              "outline": "#859585",
              "surface-container-low": "#1c1b1b",
              "on-surface": "#e5e2e1",
              "surface-container-highest": "#353534",
              "on-secondary-fixed": "#291800",
              "on-error-container": "#ffdad6",
              "tertiary": "#ced5e1",
              "on-primary": "#003918",
              "inverse-surface": "#e5e2e1",
              "error-container": "#93000a",
              "on-primary-container": "#005526",
              "secondary-container": "#dc9100",
              "on-tertiary-fixed-variant": "#404752",
              "on-secondary-fixed-variant": "#633f00",
              "on-tertiary-fixed": "#151c25",
              "error": "#ffb4ab"
            },
            fontFamily: {
              "headline": ["Bebas Neue"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pitch-gradient {
            background: linear-gradient(135deg, #42f183 0%, #00d46a 100%);
        }
        .glass-panel {
            background: rgba(19, 19, 19, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary selection:text-on-primary overflow-x-hidden">
<!-- Editorial Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute inset-0 opacity-20" data-alt="Subtle carbon fiber texture pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB-mnwbscFgldz6RYlC8FkBOLfdjiRapQivtFxOezvE5Bodd7VycpVBIdPdyLc2tvonx7xpv1UPFbqy98JV-5Jn3dIpB0J10TMREG5rYKTm0B7_3crmqzh_EW1lGS3QUaBP74CU4T_7gZUA8-q5LmxlN0Yqmv06jNahx1TydH-H4HWDWQssFL9g9CTT-0qwxAcd_Vjaq6iAJAD8gisWbra-KwQpazgsnV6Wb7zCPpAqbgrPEP17V2nvqha_6OOu_CjcoGKCPYMZGpc');"></div>
</div>
<!-- Main Registration Canvas -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-4xl grid md:grid-cols-12 gap-0 overflow-hidden rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
<!-- Left Side: Editorial Brand Block -->
<div class="hidden md:flex md:col-span-5 bg-surface-container-low flex-col justify-between p-10 relative overflow-hidden">
<div class="z-10">
<h1 class="text-5xl font-headline tracking-widest text-white mb-2">
                        MUND<span class="text-primary">IA</span>L <span class="text-primary">26</span>
</h1>
<p class="text-on-surface-variant font-label text-sm tracking-widest uppercase">The Digital Stadium Suite</p>
</div>
<div class="z-10 space-y-6">
<div class="space-y-1">
<span class="text-primary font-headline text-2xl tracking-tight block">LA QUINIELA DEFINITIVA</span>
<p class="text-on-surface-variant text-sm leading-relaxed">Únete a la comunidad de pronósticos más exclusiva del mundo y domina el ranking global.</p>
</div>
</div>
<!-- Abstract Decorative Player Silhouette -->
<div class="absolute bottom-0 right-0 w-full h-2/3 opacity-30 grayscale pointer-events-none">
<img alt="" class="w-full h-full object-cover object-center" data-alt="Blurred action shot of a soccer player stadium lights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDS25THtI4fWgOT3Pea33kAXVMUYCeTeP07gxR6VPOuYtC4qZB7OvOZZykp8IeYgHfF92kZlnqxgewiQ_0QmRHiOOfMf2Io6XfzlPWwXGjtAzjyjAw16eaAxparHE6oNnV3sEU9rtLmw_6o0Xo7yqFXzi6GDD4dd2QNbWxaBJYi-sB-SHr0_1g1A3R0CYIzSyIc2AthAgMpvnMGDG0s_UJ9vJMvdUC2HaV-TdaMS8i8JLDvQxoO8NHvdOm2a26Z5rZW7fn-2DN_LWU"/>
</div>
</div>
<!-- Right Side: Registration Form -->
<div class="md:col-span-7 bg-surface-container-high p-8 md:p-12">
<div class="mb-8">
<h2 class="text-4xl font-headline text-white mb-2">CREAR CUENTA</h2>
<p class="text-on-surface-variant text-sm">Ingresa tus datos para comenzar tu camino a la gloria.</p>
</div>
<form class="space-y-6">
<!-- Profile Photo Upload Area -->
<div class="flex items-center space-x-6 mb-8">
<div class="relative group">
<div class="w-20 h-20 rounded-full bg-surface-container-lowest border-2 border-dashed border-outline-variant flex items-center justify-center overflow-hidden transition-colors group-hover:border-primary">
<span class="material-symbols-outlined text-outline text-3xl group-hover:text-primary">add_a_photo</span>
</div>
</div>
<div class="flex-1">
<label class="block text-xs font-semibold text-primary uppercase tracking-wider mb-1">Foto de Perfil</label>
<p class="text-on-surface-variant text-[10px] uppercase">Opcional • JPG, PNG (Max 2MB)</p>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Name -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="first_name">Nombre</label>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-lg text-on-surface placeholder:text-outline/40 py-3 px-4 transition-all" id="first_name" placeholder="Ej. Javier" type="text"/>
</div>
<!-- Last Name -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="last_name">Apellido</label>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-lg text-on-surface placeholder:text-outline/40 py-3 px-4 transition-all" id="last_name" placeholder="Ej. Hernández" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Correo Electrónico</label>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-lg text-on-surface placeholder:text-outline/40 py-3 px-4 transition-all" id="email" placeholder="javier@estadio.com" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Password -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Contraseña</label>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-lg text-on-surface placeholder:text-outline/40 py-3 px-4 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="confirm_password">Confirmar</label>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-lg text-on-surface placeholder:text-outline/40 py-3 px-4 transition-all" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start space-x-3 pt-2">
<input class="mt-1 rounded border-none bg-surface-container-lowest text-primary focus:ring-primary transition-all" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            Acepto los <a class="text-primary hover:underline transition-all" href="#">Términos de Servicio</a> y la <a class="text-primary hover:underline transition-all" href="#">Política de Privacidad</a> de MundIAl 26.
                        </label>
</div>
<!-- Primary Action -->
<button class="w-full pitch-gradient text-on-primary-container font-bold text-sm tracking-[0.2em] uppercase py-4 rounded-lg shadow-[0_10px_20px_rgba(0,212,106,0.2)] hover:shadow-[0_15px_30px_rgba(0,212,106,0.3)] hover:-translate-y-0.5 active:scale-95 transition-all" type="submit">
                        Create Account
                    </button>
<!-- Secondary Action -->
<div class="text-center pt-4">
<p class="text-xs text-on-surface-variant uppercase tracking-widest">
                            ¿Ya tienes cuenta? 
                            <a class="text-primary font-bold ml-1 hover:text-white transition-colors" href="#">Iniciar Sesión</a>
</p>
</div>
</form>
</div>
</div>
</main>
<!-- Visual Footer Accent -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-30"></div>
</body></html>
