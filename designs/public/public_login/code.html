</div>
</div>

<div class="flex justify-between items-center">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="password">
                            Password
                        </label>
<a class="text-[10px] text-primary hover:underline uppercase tracking-tighter" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary/50 rounded-lg py-4 px-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>

                    </button>
</div>
