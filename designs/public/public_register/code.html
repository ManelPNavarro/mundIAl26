<body class="bg-pitch-black text-on-surface font-body selection:bg-primary selection:text-on-primary-fixed min-h-screen flex flex-col items-center justify-center p-6">
<!-- Brand Header (Simplified for focused journey) -->
<header class="mb-12">
<div class="mundial-logo-text text-5xl italic font-black flex items-center gap-0">
<span class="text-white">Mund</span>
<span class="text-primary-container">IA</span>
<span class="text-white">L 26</span>
</div>
</header>
<!-- Main Registration Card -->
<main class="w-full max-w-xl">
<div class="bg-surface-container-low rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Atmospheric Depth Elements (No Borders) -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 blur-3xl rounded-full -mr-16 -mt-16"></div>
<div class="relative z-10">
<div class="mb-10">
<h1 class="font-bebas text-4xl text-white tracking-tight mb-2">YOU'VE BEEN SUMMONED</h1>
<p class="text-on-surface-variant text-sm tracking-wide">Enter your details to claim your spot in the global arena.</p>
</div>
<form class="space-y-6">
<!-- Invite Code Section -->
<div class="bg-surface-container-lowest p-6 rounded-lg mb-8">
<label class="block font-bebas text-lg text-primary-container mb-2 tracking-wider">INVITE CODE</label>
<input class="w-full bg-transparent border-none text-2xl font-bebas tracking-[0.2em] text-white focus:ring-0 p-0 uppercase" placeholder="XXXX-XXXX-XXXX" type="text" value="WC26-GLB-4829"/>
<div class="h-px w-full bg-primary/20 mt-2"></div>
</div>
<!-- Photo Upload (Optional) -->
<div class="flex items-center gap-6 mb-8">
<div class="relative group cursor-pointer">
<div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-2 border-dashed border-outline-variant group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-outline text-3xl group-hover:text-primary">add_a_photo</span>
</div>
</div>
<div>
<span class="block text-white font-medium">Profile Photo</span>
<span class="text-xs text-on-surface-variant italic">Optional • Max 5MB</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Name -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Name</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-1 focus:ring-primary text-white p-3 transition-all" placeholder="Enter name" type="text"/>
</div>
<!-- Surname -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Surname</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-1 focus:ring-primary text-white p-3 transition-all" placeholder="Enter surname" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Email Address</label>
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-1 focus:ring-primary text-white p-3 transition-all" placeholder="name@example.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg focus:ring-1 focus:ring-primary text-white p-3 transition-all pr-10" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bebas text-2xl py-4 rounded-lg shadow-[0_10px_30px_rgba(0,212,106,0.2)] hover:shadow-[0_15px_40px_rgba(0,212,106,0.3)] hover:-translate-y-0.5 active:scale-[0.98] transition-all tracking-wider" type="submit">
                            JOIN THE COMPETITION
                        </button>
</div>
<div class="text-center pt-4">
<p class="text-xs text-on-surface-variant">
                            By joining, you agree to our 
                            <a class="text-white hover:text-primary underline underline-offset-4" href="#">Terms of Service</a> 
                            and 
                            <a class="text-white hover:text-primary underline underline-offset-4" href="#">Privacy Policy</a>.
                        </p>
</div>
</form>
</div>

</main>
<!-- Footer Content (Suppressed Global Nav as per mandate) -->
<footer class="mt-12 text-center">
<p class="text-[10px] text-outline tracking-[0.2em] uppercase">© 2026 MundIAL Editorial Platform. All rights reserved.</p>
